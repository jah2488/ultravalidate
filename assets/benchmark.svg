<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 264" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="single-shot flaw detection saturates: every reviewer catches every planted flaw; they differ only in strictness on valid claims"><style>.lbl{fill:#6b7280;font-size:13px}.sub{fill:#374151;font-size:13px;font-weight:700}.val{fill:#9aa0a6;font-size:12px}.fv{fill:#0f766e;font-size:12px;font-weight:700}.cap{fill:#9aa0a6;font-size:11px}</style>
<text x="20" y="26" class="sub" font-size="15">Single-shot detection saturates</text>
<text x="20" y="44" class="cap">12 planted flaws (incl. 4 subtle statistical traps) + 2 valid claims. Every reviewer caught every flaw;</text>
<text x="20" y="58" class="cap">they differ only in how often they withhold trust on a sound claim (the second line per bar).</text>
<text x="168" y="105" text-anchor="end" class="lbl">plain assessment</text><rect x="178" y="88" width="360" height="26" rx="4" fill="#b4b9c0"/><text x="546" y="101" class="val">100% caught <tspan class="cap">(60/60)</tspan></text><text x="546" y="115" class="cap">over-flags valid 0%</text>
<text x="168" y="155" text-anchor="end" class="lbl">assess, be skeptical</text><rect x="178" y="138" width="360" height="26" rx="4" fill="#b4b9c0"/><text x="546" y="151" class="val">100% caught <tspan class="cap">(60/60)</tspan></text><text x="546" y="165" class="cap">over-flags valid 10%</text>
<text x="168" y="205" text-anchor="end" class="lbl">ultravalidate</text><rect x="178" y="188" width="360" height="26" rx="4" fill="#0f766e"/><text x="546" y="201" class="fv">100% caught <tspan class="cap">(60/60)</tspan></text><text x="546" y="215" class="cap">over-flags valid 20%</text>
<text x="20" y="256" class="cap">3 arms, claude-haiku-4-5, 5 reps. detection is keyword-based (a recall floor, equal across arms); over-flag n=10 per arm, within noise.</text></svg>