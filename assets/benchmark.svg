<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 264" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="ultravalidate re-derives the correct number from buried data 100% of the time versus 87% for a plain review, with no false alarms"><style>.lbl{fill:#6b7280;font-size:13px}.sub{fill:#374151;font-size:13px;font-weight:700}.val{fill:#9aa0a6;font-size:12px}.fv{fill:#0f766e;font-size:12px;font-weight:700}.cap{fill:#9aa0a6;font-size:11px}</style>
<text x="20" y="26" class="sub" font-size="15">Re-derive the number, or repeat the wrong one</text>
<text x="20" y="44" class="cap">6 status updates whose headline number is wrong, with the raw data buried in noise. A catch means</text>
<text x="20" y="58" class="cap">actually re-deriving the correct figure. 2 valid claims included; no reviewer raised a false alarm.</text>
<text x="168" y="105" text-anchor="end" class="lbl">plain assessment</text><rect x="178" y="88" width="313" height="26" rx="4" fill="#b4b9c0"/><text x="499" y="101" class="val">87% re-derived <tspan class="cap">(26/30)</tspan></text><text x="499" y="115" class="cap">false alarms on valid claims 0%</text>
<text x="168" y="155" text-anchor="end" class="lbl">assess, be skeptical</text><rect x="178" y="138" width="335" height="26" rx="4" fill="#b4b9c0"/><text x="521" y="151" class="val">93% re-derived <tspan class="cap">(28/30)</tspan></text><text x="521" y="165" class="cap">false alarms on valid claims 20%</text>
<text x="168" y="205" text-anchor="end" class="lbl">ultravalidate</text><rect x="178" y="188" width="360" height="26" rx="4" fill="#0f766e"/><text x="546" y="201" class="fv">100% re-derived <tspan class="cap">(30/30)</tspan></text><text x="546" y="215" class="cap">false alarms on valid claims 0%</text>
<text x="20" y="256" class="cap">3 arms, claude-haiku-4-5, 5 reps. a catch requires the correct recomputed figure plus a reconcile signal, scored identically across arms.</text></svg>