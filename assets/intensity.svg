<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 290" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="flint intensity dose-response: output tokens fall from baseline to lite to full to ultra"><style>.lbl{fill:#6b7280;font-size:13px}.sub{fill:#6b7280;font-size:13px;font-weight:700}.val{fill:#9aa0a6;font-size:12px}.fv{fill:#d4500f;font-size:12px;font-weight:700}.cap{fill:#9aa0a6;font-size:11px}</style>
<text x="20" y="26" class="sub" font-size="15">Intensity dose-response · claude-haiku-4-5 · n=10</text>
<text x="20" y="44" class="cap">total output tokens across 7 tasks · more intensity = leaner · gate-pass = correct (code) + faithful (prose)</text>
<text x="110" y="76" text-anchor="end" class="lbl">baseline</text><rect x="120" y="60" width="420" height="24" rx="4" fill="#b4b9c0" fill-opacity="1"/><text x="548" y="76" class="val">2420 tok</text>
<text x="110" y="116" text-anchor="end" class="lbl">flint lite</text><rect x="120" y="100" width="252" height="24" rx="4" fill="#d4500f" fill-opacity="0.55"/><text x="380" y="116" class="val">1449 tok  <tspan class="fv">−40%</tspan> <tspan class="cap">(100% ok)</tspan></text>
<text x="110" y="156" text-anchor="end" class="lbl">flint full</text><rect x="120" y="140" width="238" height="24" rx="4" fill="#d4500f" fill-opacity="0.7000000000000001"/><text x="366" y="156" class="val">1373 tok  <tspan class="fv">−43%</tspan> <tspan class="cap">(100% ok)</tspan></text>
<text x="110" y="196" text-anchor="end" class="lbl">flint ultra</text><rect x="120" y="180" width="232" height="24" rx="4" fill="#d4500f" fill-opacity="0.8500000000000001"/><text x="360" y="196" class="val">1338 tok  <tspan class="fv">−45%</tspan> <tspan class="cap">(100% ok)</tspan></text>
<text x="110" y="236" text-anchor="end" class="lbl">flint feral ⚠</text><rect x="120" y="220" width="188" height="24" rx="4" fill="#b4b9c0" fill-opacity="1"/><text x="316" y="236" class="val">1085 tok  <tspan class="fv">−55%</tspan> <tspan class="cap">but 89% gate-pass ⚠</tspan></text>
<text x="20" y="282" class="cap">lite-to-ultra is free: 100% gate-pass down to −45%. feral buys −55% but the gate starts failing (prose drops concepts). not for production.</text></svg>